<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Banco Familiar{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand: #1a3c5e;
            --brand-light: #2563a8;
            --accent: #e8a020;
            --surface: #ffffff;
            --surface-soft: #f4f6f9;
            --border: #dde2ea;
            --text: #1e2a38;
            --text-muted: #6b7a8d;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(26, 60, 94, .08);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--surface-soft);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: var(--brand) !important;
            border-bottom: 3px solid var(--accent);
            padding: .75rem 0;
        }

        .navbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            color: #fff !important;
            letter-spacing: .3px;
        }

        .navbar-brand span {
            color: var(--accent);
        }

        .nav-username {
            color: rgba(255, 255, 255, .75);
            font-size: .875rem;
            font-weight: 500;
        }

        .btn-nav-outline {
            border: 1.5px solid rgba(255, 255, 255, .45);
            color: #fff;
            background: transparent;
            font-size: .8125rem;
            padding: .3rem .9rem;
            border-radius: 6px;
            transition: all .18s;
        }

        .btn-nav-outline:hover {
            background: rgba(255, 255, 255, .12);
            border-color: #fff;
            color: #fff;
        }

        .btn-nav-solid {
            background: var(--accent);
            color: var(--brand);
            border: none;
            font-size: .8125rem;
            font-weight: 600;
            padding: .3rem .9rem;
            border-radius: 6px;
            transition: background .18s;
        }

        .btn-nav-solid:hover {
            background: #d4911a;
            color: var(--brand);
        }

        /* ── CARDS ── */
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .card-header-brand {
            background: var(--brand);
            color: #fff;
            border-radius: var(--radius) var(--radius) 0 0 !important;
            padding: .9rem 1.25rem;
            font-weight: 600;
            font-size: 1rem;
        }

        /* ── TABLES ── */
        .table thead th {
            background: var(--brand);
            color: #fff;
            font-weight: 500;
            font-size: .85rem;
            letter-spacing: .3px;
            border: none;
        }

        .table tbody tr:hover {
            background: #eef2f8;
        }

        .table td,
        .table th {
            vertical-align: middle;
            border-color: var(--border);
        }

        /* ── BADGES ── */
        .badge-interna {
            background: #1a3c5e;
            color: #fff;
        }

        .badge-externa {
            background: #e8a020;
            color: #1e2a38;
        }

        .badge-enviado {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-recibido {
            background: #dcfce7;
            color: #166534;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            background: var(--brand-light);
            border-color: var(--brand-light);
        }

        .btn-primary:hover {
            background: #1e50a0;
            border-color: #1e50a0;
        }

        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--brand);
            font-weight: 600;
        }

        .btn-accent:hover {
            background: #d4911a;
            border-color: #d4911a;
            color: var(--brand);
        }

        /* ── MISC ── */
        h1,
        h2,
        h3,
        h4 {
            font-family: 'DM Serif Display', serif;
        }

        code {
            background: #e8edf4;
            color: var(--brand);
            padding: .15em .45em;
            border-radius: 4px;
            font-size: .875em;
        }

        .page-title {
            font-size: 1.6rem;
            color: var(--brand);
            margin-bottom: 0;
        }

        .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🏦 Banco <span>Familiar</span></a>
            <div class="d-flex align-items-center gap-2">
                {% if request.user.is_authenticated %}
                {% if request.user.is_superuser %}
                <a href="{% url 'dashboard' %}" class="btn-nav-solid btn">Panel Banco</a>
                {% else %}
                <a href="{% url 'dashboard' %}" class="btn-nav-solid btn">Mi Dashboard</a>
                {% endif %}
                <span class="nav-username">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn-nav-outline btn">Cerrar sesión</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn-nav-solid btn">Iniciar sesión</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
