<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Banco Distribuido{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🏦 Banco Distribuido</a>

            <div class="d-flex align-items-center gap-2">
                {% if request.user.is_authenticated %}
                {% if request.user.is_superuser %}
                <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">Panel Banco</a>
                {% else %}
                <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">Mi Dashboard</a>
                {% endif %}

                <span class="text-white ms-2 me-2">{{ request.user.username }}</span>

                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-light btn-sm">Iniciar sesión</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mt-2">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
