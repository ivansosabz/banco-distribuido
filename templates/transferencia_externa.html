{% extends "base.html" %}

{% block title %}Transferencia Externa{% endblock %}

{% block content %}
<h2 class="mb-4">Transferencia Externa</h2>

<div class="card p-4 shadow-sm col-md-6">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Transferir
        </button>
    </form>
</div>
{% endblock %}
