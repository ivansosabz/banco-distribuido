{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-sm-9 col-md-6 col-lg-4">

        <div class="card border-0" style="border-top:3px solid var(--accent) !important;">
            <div class="card-body p-4 p-sm-5">

                <div class="text-center mb-4">
                    <div style="font-size:2rem;line-height:1;margin-bottom:.5rem;">🔐</div>
                    <h4 style="color:var(--brand);">Iniciar Sesión</h4>
                    <p class="text-muted small mb-0">Accede a tu cuenta bancaria</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-500 small" style="color:var(--text);">Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario"
                            required style="border-radius:8px;border-color:var(--border);padding:.6rem .85rem;">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-500 small" style="color:var(--text);">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required
                            style="border-radius:8px;border-color:var(--border);padding:.6rem .85rem;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2"
                        style="border-radius:8px;font-weight:600;font-size:.95rem;">
                        Ingresar
                    </button>
                </form>

                {% if form.errors %}
                <div class="alert alert-danger border-0 mt-3 mb-0 py-2 text-center small rounded-3">
                    ⚠️ Usuario o contraseña incorrectos
                </div>
                {% endif %}

            </div>
        </div>

    </div>
</div>

{% endblock %}
