{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 mb-3">🏦 Banco Distribuido</h1>
    <p class="lead text-secondary mb-4">
        Simulador académico de transferencias internas y externas
    </p>

    {% if not request.user.is_authenticated %}
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">
        Iniciar sesión
    </a>
    {% endif %}
</div>
{% endblock %}
